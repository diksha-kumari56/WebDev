{% extends "base.html" %}

{% block content %}

<h3>All Contacts</h3>

<form method="GET" action="/">
    <input type="text" name="search" placeholder="Search by name or phone" value="{{ search }}">
    <button type="submit">Search</button>
</form>

<table>
    <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>

    {% for c in contacts %}
    <tr>
        <td>{{ c.name }}</td>
        <td>{{ c.phone }}</td>
        <td>{{ c.email }}</td>
        <td>
            <a href="/edit/{{ c.id }}">Edit</a>
            <a href="/delete/{{ c.id }}" onclick="return confirm('Delete this contact?')">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
