{% extends "base.html" %}
{% block content %}
<div style="max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    <h2>Event Registration</h2>
    <form action="/register" method="POST" id="regForm">
        <label>Full Name</label><br>
        <input type="text" id="name" name="name" style="width:100%; padding:10px; margin:10px 0; border: 1px solid #ddd; border-radius: 5px;">
        <label>Email Address</label><br>
        <input type="email" id="email" name="email" style="width:100%; padding:10px; margin:10px 0; border: 1px solid #ddd; border-radius: 5px;">
        <label>Select Event</label><br>
        <select name="event" style="width:100%; padding:10px; margin:10px 0; border: 1px solid #ddd; border-radius: 5px;">
            {% for event in events %}
            <option>{{ event.name }}</option>
            {% endfor %}
        </select>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top: 10px;">Submit Registration</button>
    </form>
</div>
{% endblock %}
