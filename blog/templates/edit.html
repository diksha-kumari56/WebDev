{% extends 'base.html' %}

{% block content %}

<h2 class="page-title">Edit Post</h2>

<form method="POST" class="form">
    <input type="text" name="title" value="{{ post.title }}" required>
    
    <textarea name="content" required>{{ post.content }}</textarea>
    
    <button type="submit">Update ✏️</button>
</form>

{% endblock %}
