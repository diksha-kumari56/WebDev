{% extends 'base.html' %}

{% block content %}

<h2 class="page-title">All Blog Posts</h2>

<div class="grid">
{% for post in posts %}
    <div class="card">
        <h3>{{ post.title }}</h3>
        <p>{{ post.content }}</p>

        <div class="actions">
            <a href="/edit/{{ post.id }}" class="edit">Edit</a>
            <a href="/delete/{{ post.id }}" class="delete">Delete</a>
        </div>
    </div>
{% else %}
    <p>No posts yet 😢</p>
{% endfor %}
</div>

{% endblock %}
